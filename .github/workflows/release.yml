name: release

# 推送版本 tag（如 v1.0.0）时构建 macOS + Windows 产物并发布 GitHub Release。
# 同时支持 workflow_dispatch 手动触发（仅产 artifact，不发布 Release）。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # release job 需要 write 权限创建 Release

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 下载官方 platform-tools，只提取 adb（应用唯一用到的文件，其余 fastboot/sqlite3 等是冗余）。
      - name: Download platform-tools (darwin)
        run: |
          set -euo pipefail
          curl -L -o /tmp/pt.zip https://dl.google.com/android/repository/platform-tools-latest-darwin.zip
          mkdir -p /tmp/pt-extract
          unzip -q /tmp/pt.zip -d /tmp/pt-extract
          mkdir -p third_party/platform-tools/darwin
          cp /tmp/pt-extract/platform-tools/adb third_party/platform-tools/darwin/
          chmod +x third_party/platform-tools/darwin/adb
          echo "=== staged darwin platform-tools ==="
          ls -la third_party/platform-tools/darwin/

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      # 分两次独立构建 arm64 / amd64，避免 Wails v2 多目标同名覆盖问题（issue #2608）。
      # 每次构建后立即改名打包，再清理 build/bin 为下一次构建腾出空间。
      - name: Build darwin/arm64
        run: |
          wails build -platform darwin/arm64 -clean
          ls -la "build/bin/apk-install.app/Contents/Resources/platform-tools/adb" || \
            { echo "ERROR: arm64 产物未打包 platform-tools"; exit 1; }
          cd build/bin
          ditto -c -k --keepParent apk-install.app "../../apk-install-${GITHUB_REF_NAME:-manual}-macos-arm64.zip"

      - name: Build darwin/amd64
        run: |
          wails build -platform darwin/amd64 -clean
          ls -la "build/bin/apk-install.app/Contents/Resources/platform-tools/adb" || \
            { echo "ERROR: amd64 产物未打包 platform-tools"; exit 1; }
          cd build/bin
          ditto -c -k --keepParent apk-install.app "../../apk-install-${GITHUB_REF_NAME:-manual}-macos-amd64.zip"

      - name: Verify build outputs
        run: |
          ls -la apk-install-*.zip
          test -f apk-install-*-macos-arm64.zip || { echo "缺 arm64 zip"; exit 1; }
          test -f apk-install-*-macos-amd64.zip || { echo "缺 amd64 zip"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: apk-install-*-macos-*.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 2025 年 GitHub windows 镜像移除了 NSIS（actions/runner-images#11754），需显式安装。
      # 用 choco（runner 预装）安装官方 nsis 包，比第三方 action 更可靠。
      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      # 下载官方 platform-tools，只提取 adb.exe 及其依赖的 2 个 DLL（其余为冗余）。
      # 注意：PowerShell 单引号不展开变量，含 $env:TEMP 必须用双引号。
      - name: Download platform-tools (windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = "$env:TEMP\pt.zip"
          $extract = "$env:TEMP\pt-extract"
          Invoke-WebRequest -Uri 'https://dl.google.com/android/repository/platform-tools-latest-windows.zip' -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $extract -Force
          New-Item -ItemType Directory -Force -Path 'third_party\platform-tools\windows' | Out-Null
          Copy-Item "$extract\platform-tools\adb.exe"          'third_party\platform-tools\windows\'
          Copy-Item "$extract\platform-tools\AdbWinApi.dll"    'third_party\platform-tools\windows\'
          Copy-Item "$extract\platform-tools\AdbWinUsbApi.dll" 'third_party\platform-tools\windows\'
          Write-Host '=== staged windows platform-tools ==='
          Get-ChildItem 'third_party\platform-tools\windows\' | Select-Object Name, Length | Format-Table

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build (windows/amd64 + NSIS)
        run: wails build -platform windows/amd64 -nsis -clean

      - name: Verify bundled adb in build/bin
        shell: pwsh
        run: |
          if (-not (Test-Path 'build\bin\platform-tools\adb.exe')) {
            Write-Error 'ERROR: platform-tools 未被复制到 build/bin/platform-tools'
            exit 1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            build/bin/*.exe
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    # 仅 tag 触发时才发布 Release；手动触发跳过此 job
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: |
          echo "=== 将发布的产物 ==="
          ls -laR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/*.exe
          body: |
            ## 安装说明

            ### macOS
            下载 `.zip` 解压后，把 `apk-install.app` 拖入「应用程序」文件夹。
            首次打开若提示无法验证开发者，在「系统设置 → 隐私与安全性」点击「仍要打开」。

            ### Windows
            - `*-amd64-installer.exe`：NSIS 安装包，双击安装。
            - `apk-install.exe`：绿色版，直接运行（需与 `platform-tools/` 同目录，安装包已自动处理）。

            > ⚠️ 本产物未经代码签名 / 公证。

            ---
          fail_on_unmatched_files: true
